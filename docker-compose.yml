services:
  client:
    build: ./client
    ports:
      - "5173:5173"
    env_file:
      - ./client/.env
    volumes:
      - ./client:/app
      - /app/node_modules
    depends_on:
      - api-gateway
    networks:
      - app-network
  api-gateway:
    build: ./Server/api-gateway
    ports:
      - "5003:5003"
    env_file:
      - ./Server/api-gateway/.env
    volumes:
      - ./Server/api-gateway:/app
      - api_gateway_node_modules:/app/node_modules
    depends_on:
      - redis
      - mongodb
      - user-service      
      - notes-service      
      - category-service   
    networks:
      - app-network       
  
  category-service:
    build: ./Server/category-service
    
    env_file:
      - ./Server/category-service/.env
    volumes:
      - ./Server/category-service:/app
      - category_node_modules:/app/node_modules
    depends_on:
      - redis
      - mongodb
    networks:
      - app-network        
  
  notes-service:
    build: ./Server/notes-service
    
    env_file:
      - ./Server/notes-service/.env
    volumes:
      - ./Server/notes-service:/app
      - notes_node_modules:/app/node_modules
    depends_on:
      - redis
      - mongodb
    networks:
      - app-network       
  
  user-service:
    build: ./Server/user-service
    ports:
      - "5000:5000"
    env_file:
      - ./Server/user-service/.env
    volumes:
      - ./Server/user-service:/app
      - user_node_modules:/app/node_modules
    depends_on:
      - redis
      - mongodb
    networks:
      - app-network       

  redis:
    image: redis
    ports:
      - "6379:6379"
    networks:
      - app-network       
  
  mongodb:
    image: mongo
    ports:
      - "27017:27017"
    networks:
      - app-network       

volumes:
  api_gateway_node_modules:
  category_node_modules:
  notes_node_modules:
  user_node_modules:

networks:
  app-network:            
    driver: bridge